name: TMDB ETL Pipeline CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check for secrets in code
      run: |
        echo "Checking for potential secrets..."
        if grep -r "sk-" --exclude-dir=venv --exclude-dir=.git .; then
          echo "❌ Found potential API keys in code!"
          exit 1
        fi
        if grep -r "password.*=" --exclude-dir=venv --exclude-dir=.git --exclude=".env*" .; then
          echo "⚠️ Warning: Found password assignments"
        fi
        echo "✅ No hardcoded secrets found"
    
    - name: Validate project structure
      run: |
        echo "Checking project structure..."
        required_files=("requirements.txt" ".gitignore" "README.md")
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "❌ Missing required file: $file"
            exit 1
          fi
        done
        echo "✅ Project structure valid"
    
    - name: Check Docker configuration
      run: |
        if [ -f "docker-compose.yml" ]; then
          echo "✅ Docker Compose found"
        else
          echo "❌ docker-compose.yml not found"
          exit 1
        fi
    
 imports (smoke test)
      run: |
        python -c "import sys; print('✅ Python imports working')"
